<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecos Eternos: Para Angeles 💌</title>
    <style>
        body, html { margin: 0; overflow: hidden; background: #050505; font-family: 'serif'; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; color: white; }
        
        #intro-screen { 
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #1a0a2e, #050505);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; pointer-events: auto; z-index: 20;
        }

        #hud { position: absolute; top: 20px; width: 100%; text-align: center; opacity: 0; }
        #objective { font-weight: bold; color: #ffcc00; text-shadow: 0 0 10px #ff3366; }

        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; align-items: center; pointer-events: auto; opacity: 0; }
        #joystick-base { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid #ff3366; border-radius: 50%; position: relative; touch-action: none; }
        #joystick-stick { width: 40px; height: 40px; background: #ff3366; border-radius: 50%; position: absolute; top: 30px; left: 30px; pointer-events: none; }
        
        #action-btn { width: 70px; height: 70px; border-radius: 50%; background: white; border: none; font-weight: bold; }
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="intro-screen">
            <h1>ECOS ETERNOS</h1>
            <p>Para mi alma gemela, Angeles</p>
            <button id="start-btn" style="padding: 15px 30px; background: #ff3366; color: white; border: none; border-radius: 20px;">ENTRAR AL REINO</button>
        </div>

        <div id="hud">
            <div id="objective">Recolecta 5 Llamas de Devoción</div>
            <p id="phrase">"Tu mirada encendió el universo..."</p>
        </div>

        <div id="controls">
            <div id="joystick-base"><div id="joystick-stick"></div></div>
            <button id="action-btn">PULSO</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, player, flames = [], score = 0;
        let moveX = 0, moveY = 0;
        const speed = 0.2;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0510, 0.04);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luces
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pLight = new THREE.PointLight(0xff3366, 15, 100);
            pLight.position.set(0, 5, 5);
            scene.add(pLight);

            // Jugador
            const geo = new THREE.SphereGeometry(0.5, 24, 24);
            const mat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xff3300 });
            player = new THREE.Mesh(geo, mat);
            scene.add(player);

            // Crear Llamas de Devoción (Objetivos)
            for(let i=0; i<5; i++) {
                const flameGeo = new THREE.OctahedronGeometry(0.4, 0);
                const flameMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                const flame = new THREE.Mesh(flameGeo, flameMat);
                flame.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*20, (Math.random()-0.5)*10);
                scene.add(flame);
                flames.push(flame);
            }

            camera.position.z = 10;
            setupMobileControls();
            animate();
        }

        function setupMobileControls() {
            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');

            const handleTouch = (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = base.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                const angle = Math.atan2(dy, dx);

                moveX = Math.cos(angle) * (dist/40);
                moveY = Math.sin(angle) * (dist/40);
                
                stick.style.left = (30 + moveX * 30) + "px";
                stick.style.top = (30 + moveY * 30) + "px";
            };

            base.addEventListener('touchstart', handleTouch);
            base.addEventListener('touchmove', handleTouch);
            base.addEventListener('touchend', () => {
                moveX = 0; moveY = 0;
                stick.style.left = "30px";
                stick.style.top = "30px";
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // MOVIMIENTO REAL
            if(player) {
                player.position.x += moveX * speed;
                player.position.y -= moveY * speed; // Arriba en joystick es subir en pantalla
                
                camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y, 10), 0.1);
            }

            // Colisiones (Recolectar)
            flames.forEach((f, index) => {
                f.rotation.y += 0.05;
                if(player.position.distanceTo(f.position) < 1) {
                    scene.remove(f);
                    flames.splice(index, 1);
                    score++;
                    if(navigator.vibrate) navigator.vibrate(50);
                    document.getElementById('objective').innerText = `Llamas: ${score} / 5`;
                    if(score >= 5) {
                        document.getElementById('objective').innerText = "¡REINO CONQUISTADO! Aparece el Guardián...";
                        document.getElementById('objective').style.color = "#00ff00";
                    }
                }
            });

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('hud').style.opacity = '1';
            document.getElementById('controls').style.opacity = '1';
            init();
        });
    </script>
</body>
</html>
