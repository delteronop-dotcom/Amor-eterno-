<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecos Eternos: Para Angeles 💌</title>
    <style>
        body, html { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; color: white; }
        
        /* Pantalla de Inicio */
        #intro-screen { 
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; pointer-events: auto; transition: 1s;
        }
        #intro-screen h1 { font-size: 2.5em; text-shadow: 0 0 20px #ff3366; margin-bottom: 10px; }
        
        /* HUD y Frase */
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; opacity: 0; transition: 2s; }
        #phrase-box { font-style: italic; font-size: 0.9em; padding: 10px; background: rgba(255,51,102,0.1); border-radius: 15px; display: inline-block; max-width: 80%; }

        /* Controles Móviles */
        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; align-items: center; pointer-events: auto; opacity: 0; transition: 2s;}
        #joystick-base { width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #joystick-stick { width: 50px; height: 50px; background: radial-gradient(circle, #ff3366, #990033); border-radius: 50%; box-shadow: 0 0 20px #ff3366; }
        #action-btn { width: 80px; height: 80px; border-radius: 50%; background: white; color: black; border: none; font-weight: bold; box-shadow: 0 0 30px white; }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="intro-screen">
            <h1>ECOS ETERNOS</h1>
            <p>Un viaje infinito por el amor de Angeles</p>
            <button id="start-btn" style="padding: 15px 40px; background: #ff3366; color: white; border: none; border-radius: 25px; font-weight: bold; margin-top: 20px;">INICIAR JURAMENTO</button>
        </div>

        <div id="hud">
            <h3>Reino 1: El Despertar del Fuego</h3>
            <div id="phrase-box">"Tu mirada encendió el universo y yo decidí arder para siempre."</div>
        </div>

        <div id="controls">
            <div id="joystick-base"><div id="joystick-stick"></div></div>
            <button id="action-btn">LIBERAR<br>AMOR</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, player, stars = [];
        let moveX = 0, moveY = 0;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0510, 0.05);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luces
            const light = new THREE.PointLight(0xff3366, 10, 50);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 2));

            // Jugador (Fuego Eterno)
            const playerGeo = new THREE.SphereGeometry(0.6, 32, 32);
            const playerMat = new THREE.MeshStandardMaterial({ 
                color: 0xffcc00, emissive: 0xff3300, emissiveIntensity: 2 
            });
            player = new THREE.Mesh(playerGeo, playerMat);
            scene.add(player);

            // Generar Montañas/Estrellas flotantes
            for(let i=0; i<100; i++) {
                const geo = new THREE.IcosahedronGeometry(Math.random()*2, 0);
                const mat = new THREE.MeshStandardMaterial({ color: 0x1a0a2e, flatShading: true });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
                scene.add(mesh);
                stars.push(mesh);
            }

            camera.position.z = 12;
            setupControls();
            animate();
        }

        function setupControls() {
            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');
            const actionBtn = document.getElementById('action-btn');

            // Joystick Logic
            base.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const rect = base.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);

                moveX = Math.cos(angle) * (dist/50);
                moveY = Math.sin(angle) * (dist/50);
                stick.style.transform = `translate(${moveX*40}px, ${moveY*40}px)`;
            });

            base.addEventListener('touchend', () => {
                moveX = 0; moveY = 0;
                stick.style.transform = `translate(0,0)`;
            });

            // Botón de Acción con Vibración
            actionBtn.addEventListener('touchstart', () => {
                if(navigator.vibrate) navigator.vibrate(60);
                const flash = new THREE.PointLight(0xffffff, 20, 30);
                flash.position.copy(player.position);
                scene.add(flash);
                setTimeout(() => scene.remove(flash), 200);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            player.position.x += moveX * 0.15;
            player.position.y -= moveY * 0.15;
            
            // Suavizado de cámara
            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y, player.position.z + 12), 0.05);
            camera.lookAt(player.position);

            stars.forEach(s => s.rotation.y += 0.01);
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('hud').style.opacity = '1';
                document.getElementById('controls').style.opacity = '1';
            }, 1000);
            init();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
